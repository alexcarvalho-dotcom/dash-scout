<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{width:100%;height:100%}
body{width:100%;height:100%;min-height:100vh;background:#0f1117;color:#e8eaf0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;display:flex;flex-direction:column;overflow:hidden;position:fixed;top:0;left:0;right:0;bottom:0}
.hdr{display:flex;align-items:center;gap:8px;padding:9px 13px;background:#1a1d27;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0}
.dot{width:7px;height:7px;background:#34d399;border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.htitle{font-weight:600;font-size:13px;flex:1;color:#e8eaf0}
.tag{background:#22263a;border:1px solid rgba(255,255,255,0.08);border-radius:4px;padding:1px 7px;font-size:10px;color:#a78bfa;margin-left:3px}
.chat{flex:1;overflow-y:auto;padding:11px 13px;display:flex;flex-direction:column;gap:9px;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:3px}
.chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}
.msg{display:flex;gap:7px;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.user{flex-direction:row-reverse}
.av{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.avai{background:linear-gradient(135deg,#6c63ff,#a78bfa);color:#fff}
.avuser{background:#22263a;color:#8b8fa8;border:1px solid rgba(255,255,255,0.08)}
.bub{max-width:85%;padding:8px 11px;border-radius:11px;line-height:1.55;font-size:12.5px}
.bai{background:#1a1d27;border:1px solid rgba(255,255,255,0.08);border-top-left-radius:3px;color:#e8eaf0}
.buser{background:#6c63ff;color:#fff;border-top-right-radius:3px}
.sugs{display:flex;flex-wrap:wrap;gap:5px;padding:0 13px 7px}
.sug{background:#22263a;border:1px solid rgba(255,255,255,0.08);color:#8b8fa8;font-size:11px;padding:4px 9px;border-radius:20px;cursor:pointer;transition:all .15s;white-space:nowrap}
.sug:hover{border-color:#6c63ff;color:#a78bfa}
.inpa{padding:8px 10px;border-top:1px solid rgba(255,255,255,0.08);background:#1a1d27;display:flex;gap:7px;align-items:flex-end;flex-shrink:0}
textarea{flex:1;background:#22263a;border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#e8eaf0;font-family:inherit;font-size:12.5px;padding:7px 11px;resize:none;min-height:33px;max-height:80px;outline:none;transition:border-color .15s;line-height:1.4}
textarea::placeholder{color:#8b8fa8}
textarea:focus{border-color:#6c63ff}
.sbtn{width:33px;height:33px;background:#6c63ff;border:none;border-radius:8px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
.sbtn:hover{opacity:.85}.sbtn:disabled{opacity:.3;cursor:default}
.dots{display:flex;gap:4px;align-items:center}
.dots span{width:5px;height:5px;background:#8b8fa8;border-radius:50%;animation:b .9s infinite}
.dots span:nth-child(2){animation-delay:.15s}.dots span:nth-child(3){animation-delay:.3s}
@keyframes b{0%,60%,100%{transform:none}30%{transform:translateY(-5px)}}
</style>
</head>
<body>

<div class="hdr">
  <div class="dot"></div>
  <span class="htitle">Dash Scout Assistant</span>
  <span class="tag" id="tSala">-</span>
  <span class="tag" id="tMes">-</span>
  <span class="tag" id="tCanal">-</span>
</div>

<div class="chat" id="chat"></div>

<div class="sugs" id="sugs">
  <button class="sug" onclick="sug(this)">Quanto tá a captação?</button>
  <button class="sug" onclick="sug(this)">Como está a margem?</button>
  <button class="sug" onclick="sug(this)">O que é TxEfetivação?</button>
  <button class="sug" onclick="sug(this)">Análise geral do período</button>
  <button class="sug" onclick="sug(this)">Como está o faturamento?</button>
  <button class="sug" onclick="sug(this)">Qual o ticket médio?</button>
</div>

<div class="inpa">
  <textarea id="inp" placeholder="Pergunte sobre as métricas..." rows="1"
    onkeydown="hk(event)" oninput="ar(this)"></textarea>
  <button class="sbtn" id="btn" onclick="send()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</div>

<script>
// ── LER PARÂMETROS DA URL (passados pela medida DAX) ─────────────────────────
const p = new URLSearchParams(window.location.search);
const g = (k, d) => decodeURIComponent(p.get(k) || d);

const CTX = {
  sala:    g('sala',  'Todas as Salas'),
  mes:     g('mes',   'Período Selecionado'),
  canal:   g('canal', 'Todos os Canais'),
  key:     g('key',   ''),

  // Vendas
  cap:         g('cap',        '-'),
  capTGT:      g('captgt',     '-'),
  capPL:       g('cappl',      '-'),
  varCapTGT:   g('vcaptgt',    '-'),
  varCapPL:    g('vcappl',     '-'),
  varCapLY:    g('vcaply',     '-'),
  varCapLM:    g('vcaplm',     '-'),

  // Efetivação
  efe:         g('efe',        '-'),
  efeTGT:      g('efetgt',     '-'),
  efePL:       g('efepl',      '-'),
  varEfeTGT:   g('vefetgt',    '-'),
  varEfeLY:    g('vefely',     '-'),
  txEfe:       g('txefe',      '-'),
  txEfeTGT:    g('txefetgt',   '-'),
  varTxEfe:    g('vtxefe',     '-'),

  // Faturamento
  fat:         g('fat',        '-'),
  fatTGT:      g('fattgt',     '-'),
  varFatTGT:   g('vfattgt',    '-'),
  varFatLY:    g('vfatly',     '-'),

  // Indicadores
  tkt:         g('tkt',        '-'),
  varTktLY:    g('vtktly',     '-'),
  varTktLM:    g('vtktlm',     '-'),
  pmv:         g('pmv',        '-'),
  varPmvLY:    g('vpmvly',     '-'),
  ipc:         g('ipc',        '-'),
  varIpcLY:    g('vipcly',     '-'),

  // Financeiro
  rob:         g('rob',        '-'),
  varRobTGT:   g('vrobtgt',    '-'),
  varRobLY:    g('vrobly',     '-'),
  rol:         g('rol',        '-'),
  varRolTGT:   g('vroltgt',    '-'),
  margem:      g('margem',     '-'),
  margemTGT:   g('margemtgt',  '-'),
  varMargTGT:  g('vmargtgt',   '-'),
  varMargLY:   g('vmargly',    '-'),

  // Volume
  pedidos:     g('pedidos',    '-'),
  varPedLY:    g('vpedly',     '-'),
  sessoes:     g('sessoes',    '-'),
  varSesLY:    g('vsesly',     '-'),
  conversao:   g('conv',       '-'),

  // Outros
  dev:         g('dev',        '-'),
  varDevLY:    g('vdevly',     '-'),
  takeRate:    g('tr',         '-'),
  varTrLY:     g('vtrly',      '-'),
  cupom:       g('cupom',      '-'),
  vcorp:       g('vcorp',      '-'),
  pers:        g('pers',       '-'),
  gift:        g('gift',       '-'),
};

// Preencher tags do header
document.getElementById('tSala').textContent  = CTX.sala;
document.getElementById('tMes').textContent   = CTX.mes;
document.getElementById('tCanal').textContent = CTX.canal;

// ── SYSTEM PROMPT COM DADOS REAIS ────────────────────────────────────────────
const SYS = `Você é o BI Assistant do Dash Scout, dashboard de vendas da Centauro.
Responda SEMPRE em português, de forma clara e direta (máximo 3 parágrafos curtos).
Não use asteriscos nem markdown — texto simples apenas.

CONTEXTO ATUAL: Sala: ${CTX.sala} | Mês: ${CTX.mes} | Canal: ${CTX.canal}

DADOS REAIS DO DASHBOARD AGORA:
- Captação: ${CTX.cap} | vs TGT: ${CTX.varCapTGT} | vs PL: ${CTX.varCapPL} | vs LY: ${CTX.varCapLY} | vs LM: ${CTX.varCapLM} | Meta TGT: ${CTX.capTGT} | Meta PL: ${CTX.capPL}
- Efetivação: ${CTX.efe} | vs TGT: ${CTX.varEfeTGT} | vs LY: ${CTX.varEfeLY} | Meta TGT: ${CTX.efeTGT} | Meta PL: ${CTX.efePL}
- TxEfetivação: ${CTX.txEfe} | Meta TGT: ${CTX.txEfeTGT} | Var vs TGT: ${CTX.varTxEfe}
- Faturamento: ${CTX.fat} | vs TGT: ${CTX.varFatTGT} | vs LY: ${CTX.varFatLY} | Meta: ${CTX.fatTGT}
- TKT Médio: ${CTX.tkt} | vs LY: ${CTX.varTktLY} | vs LM: ${CTX.varTktLM}
- PMV: ${CTX.pmv} | vs LY: ${CTX.varPmvLY}
- IPC: ${CTX.ipc} | vs LY: ${CTX.varIpcLY}
- ROB: ${CTX.rob} | vs TGT: ${CTX.varRobTGT} | vs LY: ${CTX.varRobLY}
- ROL: ${CTX.rol} | vs TGT: ${CTX.varRolTGT}
- Margem: ${CTX.margem} | Meta TGT: ${CTX.margemTGT} | Var vs TGT: ${CTX.varMargTGT} | Var vs LY: ${CTX.varMargLY}
- Pedidos: ${CTX.pedidos} | vs LY: ${CTX.varPedLY}
- Sessões: ${CTX.sessoes} | vs LY: ${CTX.varSesLY} | Conversão: ${CTX.conversao}
- Devoluções: ${CTX.dev} | vs LY: ${CTX.varDevLY}
- Take Rate 3P: ${CTX.takeRate} | Var vs LY: ${CTX.varTrLY}
- Captação Cupom: ${CTX.cupom} | VCorp: ${CTX.vcorp} | Personalização: ${CTX.pers} | Giftback: ${CTX.gift}

DEFINIÇÕES:
Captacao=total vendas captadas (pedidos realizados). Efetivacao=vendas pagas/confirmadas. TxEfetivacao=Efe/Cap (conversão). Faturamento=vendas faturadas canal 1P. TKT_MEDIO=Efe/Pedidos. PMV=Efe/Itens. IPC=Itens/Pedidos. ROB=Receita Operacional Bruta. ROL=ROB menos impostos e devoluções. Margem=LB/ROL. TakeRate=comissão sellers 3P. LY=ano anterior. LM=mês anterior. TGT=target. PL=plano orçamentário. 1P=loja própria. 3P=marketplace. Salas: C, F, O, V.

Use os dados reais acima para responder. Se perguntarem sobre valores, use exatamente os números fornecidos.`;

// ── ESTADO ───────────────────────────────────────────────────────────────────
const history = [];
let loading = false;

// ── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  add('ai', `Olá! Contexto carregado: <strong>${CTX.sala}</strong> · <strong>${CTX.mes}</strong> · <strong>${CTX.canal}</strong>.<br>Pode perguntar sobre qualquer métrica do dashboard!`);
});

// ── FUNÇÕES ──────────────────────────────────────────────────────────────────
function add(role, html) {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg ' + (role === 'user' ? 'user' : '');
  const av = document.createElement('div');
  av.className = 'av ' + (role === 'ai' ? 'avai' : 'avuser');
  av.textContent = role === 'ai' ? 'DS' : 'VC';
  const bub = document.createElement('div');
  bub.className = 'bub ' + (role === 'ai' ? 'bai' : 'buser');
  bub.innerHTML = html;
  d.appendChild(av); d.appendChild(bub);
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function typ() {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg'; d.id = 'typ';
  const av = document.createElement('div');
  av.className = 'av avai'; av.textContent = 'DS';
  const bub = document.createElement('div');
  bub.className = 'bub bai';
  bub.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  d.appendChild(av); d.appendChild(bub);
  chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const el = document.getElementById('inp');
  const txt = el.value.trim();
  if (!txt || loading || !CTX.key) return;
  el.value = ''; ar(el);
  document.getElementById('sugs').style.display = 'none';
  loading = true; document.getElementById('btn').disabled = true;
  add('user', txt);
  history.push({ role: 'user', parts: [{ text: txt }] });
  typ();
  try {
    const r = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${CTX.key}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYS }] },
          contents: history
        })
      }
    );
    const data = await r.json();
    document.getElementById('typ')?.remove();
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    if (!reply) {
      add('ai', 'Erro: ' + (data.error?.message || 'resposta vazia'));
    } else {
      history.push({ role: 'model', parts: [{ text: reply }] });
      add('ai', reply
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>'));
    }
  } catch(e) {
    document.getElementById('typ')?.remove();
    add('ai', 'Falha na conexão: ' + e.message);
  }
  loading = false;
  document.getElementById('btn').disabled = false;
  document.getElementById('inp').focus();
}

function sug(b) { document.getElementById('inp').value = b.textContent; send(); }
function hk(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
function ar(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 80) + 'px'; }
</script>
</body>
</html>

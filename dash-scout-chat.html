<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{width:100%;height:100%}
body{width:100%;height:100%;background:#0f1117;color:#e8eaf0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;display:flex;flex-direction:column;overflow:hidden;position:fixed;top:0;left:0;right:0;bottom:0}
.hdr{display:flex;align-items:center;gap:8px;padding:9px 13px;background:#1a1d27;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0}
.dot{width:7px;height:7px;background:#34d399;border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.htitle{font-weight:600;font-size:13px;flex:1;color:#e8eaf0}
.tag{background:#22263a;border:1px solid rgba(255,255,255,0.08);border-radius:4px;padding:1px 7px;font-size:10px;color:#a78bfa;margin-left:3px}
.chat{flex:1;overflow-y:auto;padding:11px 13px;display:flex;flex-direction:column;gap:9px;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:3px}
.chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}
.msg{display:flex;gap:7px;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.user{flex-direction:row-reverse}
.av{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.avai{background:linear-gradient(135deg,#6c63ff,#a78bfa);color:#fff}
.avuser{background:#22263a;color:#8b8fa8;border:1px solid rgba(255,255,255,0.08)}
.bub{max-width:85%;padding:8px 11px;border-radius:11px;line-height:1.55;font-size:12.5px}
.bai{background:#1a1d27;border:1px solid rgba(255,255,255,0.08);border-top-left-radius:3px;color:#e8eaf0}
.buser{background:#6c63ff;color:#fff;border-top-right-radius:3px}
.chart-bubble{background:#1a1d27;border:1px solid rgba(255,255,255,0.08);border-radius:11px;border-top-left-radius:3px;padding:11px;max-width:97%}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.chart-title{font-size:11px;font-weight:600;color:#e8eaf0}
.chart-close{background:none;border:none;color:#8b8fa8;cursor:pointer;font-size:16px;line-height:1;padding:0 2px}
.chart-close:hover{color:#e8eaf0}
.chart-wrap{position:relative;height:160px}
.chart-note{font-size:11px;color:#8b8fa8;margin-top:6px;line-height:1.4}
.sugs{display:flex;flex-wrap:wrap;gap:5px;padding:0 13px 7px}
.sug{background:#22263a;border:1px solid rgba(255,255,255,0.08);color:#8b8fa8;font-size:11px;padding:4px 9px;border-radius:20px;cursor:pointer;transition:all .15s;white-space:nowrap}
.sug:hover{border-color:#6c63ff;color:#a78bfa}
.inpa{padding:8px 10px;border-top:1px solid rgba(255,255,255,0.08);background:#1a1d27;display:flex;gap:7px;align-items:flex-end;flex-shrink:0}
textarea{flex:1;background:#22263a;border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#e8eaf0;font-family:inherit;font-size:12.5px;padding:7px 11px;resize:none;min-height:33px;max-height:80px;outline:none;transition:border-color .15s;line-height:1.4}
textarea::placeholder{color:#8b8fa8}
textarea:focus{border-color:#6c63ff}
.sbtn{width:33px;height:33px;background:#6c63ff;border:none;border-radius:8px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
.sbtn:hover{opacity:.85}.sbtn:disabled{opacity:.3;cursor:default}
.dots{display:flex;gap:4px;align-items:center}
.dots span{width:5px;height:5px;background:#8b8fa8;border-radius:50%;animation:b .9s infinite}
.dots span:nth-child(2){animation-delay:.15s}.dots span:nth-child(3){animation-delay:.3s}
@keyframes b{0%,60%,100%{transform:none}30%{transform:translateY(-5px)}}
</style>
</head>
<body>
<div class="hdr">
  <div class="dot"></div>
  <span class="htitle">Dash Scout Assistant</span>
  <span class="tag" id="tSala">-</span>
  <span class="tag" id="tMes">-</span>
  <span class="tag" id="tCanal">-</span>
</div>
<div class="chat" id="chat"></div>
<div class="sugs" id="sugs">
  <button class="sug" onclick="sug(this)">Quanto tá a captação?</button>
  <button class="sug" onclick="sug(this)">Como está a margem?</button>
  <button class="sug" onclick="sug(this)">O que é TxEfetivação?</button>
  <button class="sug" onclick="sug(this)">Análise geral do período</button>
  <button class="sug" onclick="sug(this)">Gráfico captação vs target</button>
  <button class="sug" onclick="sug(this)">Qual o ticket médio?</button>
</div>
<div class="inpa">
  <textarea id="inp" placeholder="Pergunte sobre as métricas..." rows="1" onkeydown="hk(event)" oninput="ar(this)"></textarea>
  <button class="sbtn" id="btn" onclick="send()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</div>
<script>
// ── LER URL ──────────────────────────────────────────────────
const p = new URLSearchParams(window.location.search);
const g = (k, d) => decodeURIComponent(p.get(k) || d);

const C = {
  sala:  g('sala',  'Todas as Salas'),
  mes:   g('mes',   'Periodo Selecionado'),
  canal: g('canal', 'Todos os Canais'),
  key:   g('key',   ''),
  cap:   g('cap',  '-'), ctgt: g('ctgt','-'), cpl:  g('cpl', '-'),
  vct:   g('vct',  '-'), vcp:  g('vcp', '-'), vcy:  g('vcy', '-'), vcm:  g('vcm', '-'),
  efe:   g('efe',  '-'), etgt: g('etgt','-'), epl:  g('epl', '-'),
  vet:   g('vet',  '-'), vey:  g('vey', '-'),
  txe:   g('txe',  '-'), txet: g('txet','-'), vtxe: g('vtxe','-'),
  fat:   g('fat',  '-'), ftgt: g('ftgt','-'), vft:  g('vft', '-'), vfy:  g('vfy', '-'),
  tkt:   g('tkt',  '-'), vtly: g('vtly','-'), vtlm: g('vtlm','-'),
  pmv:   g('pmv',  '-'), vpy:  g('vpy', '-'),
  ipc:   g('ipc',  '-'), viy:  g('viy', '-'),
  rob:   g('rob',  '-'), vrbt: g('vrbt','-'), vrby: g('vrby','-'),
  rol:   g('rol',  '-'), vrlt: g('vrlt','-'),
  mg:    g('mg',   '-'), mgt:  g('mgt', '-'), vmt:  g('vmt', '-'), vmy:  g('vmy', '-'),
  ped:   g('ped',  '-'), vpdy: g('vpdy','-'),
  ses:   g('ses',  '-'), vsy:  g('vsy', '-'), conv: g('conv','-'),
  dev:   g('dev',  '-'), vdy:  g('vdy', '-'),
  tr:    g('tr',   '-'), vtry: g('vtry','-'),
  cup:   g('cup',  '-'), vco:  g('vco', '-'), per:  g('per', '-'), gif:  g('gif', '-'),
  // séries diárias
  scap:  g('scap', ''),
  stgt:  g('stgt', ''),
  sefe:  g('sefe', ''),
  dias:  g('dias', ''),
};

// Parse séries
const parseSerie = (s) => s && s !== '-' ? s.split(',').map(v => parseInt(v.replace(/\./g,'').replace(/,/g,'')) || 0) : [];
const parseDias  = (s) => s && s !== '-' ? s.split(',') : [];
const SCAP = parseSerie(C.scap);
const STGT = parseSerie(C.stgt);
const SEFE = parseSerie(C.sefe);
const DIAS = parseDias(C.dias);

document.getElementById('tSala').textContent  = C.sala;
document.getElementById('tMes').textContent   = C.mes;
document.getElementById('tCanal').textContent = C.canal;

const fmtV = (v, s='%') => v === '-' ? '-' : (parseFloat(v) >= 0 ? '+' : '') + v + s;
const fmt  = (v, s='') => v === '-' ? '-' : v + s;

const SYS = `Você é o BI Assistant do Dash Scout, dashboard de vendas da Centauro.
Responda SEMPRE em português, direto e objetivo (máximo 3 parágrafos). Sem asteriscos ou markdown.

CONTEXTO: Sala: ${C.sala} | Mês: ${C.mes} | Canal: ${C.canal}

DADOS REAIS:
- Captação: R$ ${C.cap} | Meta TGT: R$ ${C.ctgt} | Meta PL: R$ ${C.cpl} | vs TGT: ${fmtV(C.vct)} | vs PL: ${fmtV(C.vcp)} | vs LY: ${fmtV(C.vcy)} | vs LM: ${fmtV(C.vcm)}
- Efetivação: R$ ${C.efe} | Meta TGT: R$ ${C.etgt} | Meta PL: R$ ${C.epl} | vs TGT: ${fmtV(C.vet)} | vs LY: ${fmtV(C.vey)}
- TxEfetivação: ${fmt(C.txe,'%')} | Meta: ${fmt(C.txet,'%')} | Var TGT: ${fmtV(C.vtxe,'pp')}
- Faturamento: R$ ${C.fat} | Meta: R$ ${C.ftgt} | vs TGT: ${fmtV(C.vft)} | vs LY: ${fmtV(C.vfy)}
- TKT Médio: R$ ${C.tkt} | vs LY: ${fmtV(C.vtly)} | vs LM: ${fmtV(C.vtlm)}
- PMV: R$ ${C.pmv} | vs LY: ${fmtV(C.vpy)}
- IPC: ${C.ipc} | vs LY: ${fmtV(C.viy)}
- ROB: R$ ${C.rob} | vs TGT: ${fmtV(C.vrbt)} | vs LY: ${fmtV(C.vrby)}
- ROL: R$ ${C.rol} | vs TGT: ${fmtV(C.vrlt)}
- Margem: ${fmt(C.mg,'%')} | Meta: ${fmt(C.mgt,'%')} | Var TGT: ${fmtV(C.vmt,'pp')} | Var LY: ${fmtV(C.vmy,'pp')}
- Pedidos: ${C.ped} | vs LY: ${fmtV(C.vpdy)}
- Sessões: ${C.ses} | vs LY: ${fmtV(C.vsy)} | Conversão: ${fmt(C.conv,'%')}
- Devoluções: R$ ${C.dev} | vs LY: ${fmtV(C.vdy)}
- Take Rate 3P: ${fmt(C.tr,'%')} | Var LY: ${fmtV(C.vtry,'pp')}
- Captação Cupom: R$ ${C.cup} | VCorp: R$ ${C.vco} | Personalização: R$ ${C.per} | Giftback: R$ ${C.gif}

DEFINIÇÕES: Captacao=pedidos realizados. Efetivacao=pedidos pagos. TxEfetivacao=Efe/Cap. Faturamento=vendas 1P. TKT_MEDIO=Efe/Pedidos. PMV=Efe/Itens. IPC=Itens/Pedidos. ROB=Receita Bruta. ROL=ROB menos impostos. Margem=LB/ROL. TakeRate=comissão 3P. LY=ano anterior. LM=mês anterior. TGT=target. PL=plano.`;

// ── ESTADO ───────────────────────────────────────────────────
const history = [];
let loading = false;
const charts = {};

// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('load', () => {
  add('ai', `Olá! Contexto carregado: <strong>${C.sala}</strong> · <strong>${C.mes}</strong> · <strong>${C.canal}</strong>.<br>Pode perguntar sobre qualquer métrica ou pedir um gráfico!`);
});

// ── ADD MSG ──────────────────────────────────────────────────
function add(role, html) {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg ' + (role === 'user' ? 'user' : '');
  const av = document.createElement('div');
  av.className = 'av ' + (role === 'ai' ? 'avai' : 'avuser');
  av.textContent = role === 'ai' ? 'DS' : 'VC';
  const bub = document.createElement('div');
  bub.className = 'bub ' + (role === 'ai' ? 'bai' : 'buser');
  bub.innerHTML = html;
  d.appendChild(av); d.appendChild(bub);
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

// ── TYPING ───────────────────────────────────────────────────
function typ() {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg'; d.id = 'typ';
  const av = document.createElement('div');
  av.className = 'av avai'; av.textContent = 'DS';
  const bub = document.createElement('div');
  bub.className = 'bub bai';
  bub.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  d.appendChild(av); d.appendChild(bub);
  chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
}

// ── ADD CHART ────────────────────────────────────────────────
function addChart(titulo, labels, series, nota) {
  const chat = document.getElementById('chat');
  const msg = document.createElement('div');
  msg.className = 'msg';
  const id = 'c_' + Date.now();
  const av = document.createElement('div');
  av.className = 'av avai'; av.textContent = 'DS';
  const wrap = document.createElement('div');
  wrap.className = 'chart-bubble';
  wrap.innerHTML =
    '<div class="chart-header">' +
      '<span class="chart-title">' + titulo + '</span>' +
      '<button class="chart-close" onclick="removeChart(\'' + id + '\',this)">×</button>' +
    '</div>' +
    '<div class="chart-wrap"><canvas id="' + id + '"></canvas></div>' +
    (nota ? '<p class="chart-note">' + nota + '</p>' : '');
  msg.appendChild(av); msg.appendChild(wrap);
  chat.appendChild(msg); chat.scrollTop = chat.scrollHeight;

  setTimeout(() => {
    const ctx = document.getElementById(id) && document.getElementById(id).getContext('2d');
    if (!ctx) return;
    charts[id] = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: series.map(function(s) {
          return {
            label: s.label, data: s.data,
            borderColor: s.cor, backgroundColor: s.cor + '18',
            borderWidth: s.dashed ? 1.5 : 2,
            borderDash: s.dashed ? [5,4] : [],
            pointRadius: 0, pointHoverRadius: 4, tension: 0.4, fill: false
          };
        })
      },
      options: {
        responsive: true, maintainAspectRatio: false, animation: { duration: 400 },
        plugins: {
          legend: { labels: { color:'#8b8fa8', font:{size:10}, boxWidth:10, padding:8 } },
          tooltip: { backgroundColor:'#1a1d27', borderColor:'rgba(255,255,255,0.08)', borderWidth:1, titleColor:'#e8eaf0', bodyColor:'#8b8fa8', padding:7 }
        },
        scales: {
          x: { ticks:{color:'#8b8fa8',font:{size:9},maxTicksLimit:8,maxRotation:0}, grid:{color:'rgba(255,255,255,0.04)'} },
          y: { ticks:{color:'#8b8fa8',font:{size:9}}, grid:{color:'rgba(255,255,255,0.04)'} }
        }
      }
    });
  }, 50);
}

function removeChart(id, btn) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
  btn.closest('.msg').remove();
}

// ── DETECT CHART REQUEST ─────────────────────────────────────
function tryChart(txt, reply) {
  const l = txt.toLowerCase();
  const isChart = l.includes('gráfico') || l.includes('grafico') ||
                  l.includes('evolução') || l.includes('evolucao') ||
                  l.includes('dia a dia') || l.includes('série') ||
                  l.includes('serie') || l.includes('chart') || l.includes('plota');

  if (!isChart || SCAP.length === 0) return false;

  const series = [];
  const wantEfe = l.includes('efetiv');
  const wantCap = !wantEfe || l.includes('captaç') || l.includes('captac');
  const wantTgt = l.includes('target') || l.includes('tgt') || l.includes('meta');

  if (wantEfe) series.push({ label: 'Efetivação', data: SEFE, cor: '#34d399', dashed: false });
  if (wantCap || !wantEfe) series.push({ label: 'Captação', data: SCAP, cor: '#6c63ff', dashed: false });
  if (wantTgt || (!wantEfe && STGT.length > 0)) series.push({ label: 'Target', data: STGT, cor: '#fbbf24', dashed: true });

  const titulo = 'Evolução Diária — ' + C.mes + ' (' + C.sala + ')';
  const nota = reply.replace(/\n/g,' ').substring(0, 100);
  addChart(titulo, DIAS, series, nota);
  return true;
}

// ── SEND ─────────────────────────────────────────────────────
async function send() {
  const el = document.getElementById('inp');
  const txt = el.value.trim();
  if (!txt || loading || !C.key) return;
  el.value = ''; ar(el);
  document.getElementById('sugs').style.display = 'none';
  loading = true; document.getElementById('btn').disabled = true;
  add('user', txt);
  history.push({ role: 'user', parts: [{ text: txt }] });
  typ();
  try {
    const r = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + C.key,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ system_instruction: { parts: [{ text: SYS }] }, contents: history })
      }
    );
    const data = await r.json();
    document.getElementById('typ') && document.getElementById('typ').remove();
    const reply = (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0] && data.candidates[0].content.parts[0].text) || '';
    if (!reply) {
      add('ai', 'Erro: ' + ((data.error && data.error.message) || 'resposta vazia'));
    } else {
      history.push({ role: 'model', parts: [{ text: reply }] });
      if (!tryChart(txt, reply)) {
        add('ai', reply.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>'));
      }
    }
  } catch(e) {
    document.getElementById('typ') && document.getElementById('typ').remove();
    add('ai', 'Falha: ' + e.message);
  }
  loading = false; document.getElementById('btn').disabled = false;
  document.getElementById('inp').focus();
}

function sug(b) { document.getElementById('inp').value = b.textContent; send(); }
function hk(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
function ar(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 80) + 'px'; }
</script>
</body>
</html>
